front:
  text: 十劑表序兵為不祥之器取足以弭亂藥非授餐之常取足以療疾善弭亂者知彼知己善療疾者知病知藥其不知症者無論矣知症而不知藥如遣將非人適足致敗夫兵不過奇正奇正之變不可勝窮藥不過氣味氣味之變亦不可勝窮通四時五行之化察五臟六腑之宜辨百草辛酸苦甘鹹之味審人身喜怒悲憂恐之情故以治百病道精而效神也醫學矇昧各據門戶執古方不能治今病讀醫經不如多臨症之說不深求經方藥録用意所在徒創異說以博名譽論說日繁醫學日晦故讀古人之書而察其理則知今之症辨古人之方而明其用則知今之藥然後察奇偶佐使之宜知氣味制化之妙變而通之神而明之衆品雜進不為多一味獨行不為少溫涼可以相使燥濕可以相濟輕重可以相維如身之使臂臂之使指夫豈粗解藥性率爾處方所能中病哉故一味有一味之性一氣有一氣之用合成一方則氣味殊而用亦遂異呂覽云夫草有莘有藟獨食之殺人合而食之則益壽非性改也制化之妙也豫少遊山左受學於陽湖張宛鄰先生名琦字翰風為館陶令十年循聲卓著著有素問釋義十卷先生嘗取明劉氏云密本草述潛江劉公名若金號云密以名進士官至司寇值明季喪亂社門高尚自號蠡園逸叟數十年精力皆萃於此書洋洋乎八十餘萬言名曰本草述別擇精粗刪繁就簡為本草述録六卷豫讀之乃見藥物氣味之真而得古人主方制化之妙竊以為本經別録諸書著其治而不言其理千金外臺之方詳所主而不審其由以故後學罕所會悟欲明制化之妙必先求所以制化之理又必分求其所專擅而後可合求其所通變爰就其書以徐之才十劑之說為表以明之庶幾求藥性者易於省覽而於處方治病亦不無小補焉道光庚子年十一月朔安吳包誠

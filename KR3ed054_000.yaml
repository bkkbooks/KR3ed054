body:
  text: 十劑解宣劑者湧劑也素問曰高者因而越之木鬱則達之傷寒論曰大法春宜吐以病在上也儒門事親曰世人皆以宣為通劑不知十劑之中已有通劑以宣為泄劑不知十劑之中已有瀉劑宣者升而上之也以君召臣曰宣義或同凡邪氣在上可以搏而躍之者皆宜宣劑通劑者流通之劑也通與瀉相類瀉惟下行通則兼旁行凡辛香流走之屬皆能通儒門事親曰數至圊而不得便宜通因通用湯液序例曰通可去滯故凡病之有氣無質留滯不去者皆宜通劑補劑者補益之劑也素問曰因其衰而彰之形不足者溫之以氣精不足者補之以味又曰肝用辛補之心用鹹補之脾用甘補之肺用酸補之腎用苦補之八十一難曰陽氣不足陰氣有餘當先補其陽而後瀉其陰陰氣不足陽氣有餘當先補其陰而後瀉其陽千金方曰人生四十以後宜常服補劑以氣血衰弱也瀉劑者泄瀉之謂即下劑也素問曰其下者引而竭之中滿者瀉之於內其實者散而瀉之又曰實則瀉之土鬱則奪之八十一難曰瀉南方火補北方水子能令母實母能令子虛儒門事親曰諸痛皆實痛隨利減湯液序例曰瀉可去閉凡病有氣有質閉塞鬱結者皆宜瀉劑輕劑者輕揚發散之謂即汗劑也素問曰因其輕而揚之其有邪者漬形以為汗其在皮者汗而發之儒門事親曰邪客皮膚宜輕劑湯液序例曰輕可去實以其開發腠理使病外出也重劑者重鎮之劑也體重而性沉者足以鎮壓亂逆儒門事親曰久病咳嗽涎潮於上形羸不可峻攻以重劑縋之湯液序例曰重可去怯以其有堅徑之力也滑劑者滑利之劑也周禮曰以滑養竅鄭氏注曰凡諸滑物通利往來似竅儒門事親曰大便燥結小便淋閉皆宜滑劑凡病澀滯有不宜通與瀉者惟滑劑足以利之澀劑者收澀之劑也素問曰心苦緩急食酸以收之肺欲收急食鹹以收之湯液序例曰澀以固脫凡散脫之症必酸澀之劑使之祕固而後發者可返散者可收燥劑者燥烈之謂即去濕之劑也素問曰脾苦濕急食苦以燥之儒門事親曰積寒久冷若病濕者宜燥之凡病濕而不可以泄利除者非燥劑不為功濕劑者柔潤之劑也與滑相類而專於滋養素問曰辛以潤之蓋辛能走氣氣能化液故也儒門事親曰人有枯涸皴竭之病不獨金化為然蓋有火以乘之非濕劑不能愈湯液序例曰濕可去枯故凡津虧血燥之症皆宜濕劑十劑表上手太陰肺經宣通白前甘辛微溫入肺下氣治諸逆因感邪者當歸辛溫入肺脾肝血分養血和血行血治氣血昏亂一切血病白芷辛溫入胃肺大腸治頭痛補黃耆甘微溫入肺脾三焦腎命門益氣助三焦元陽人參甘微苦溫入肺補元氣安精神生液瀉虛火黨參甘溫入肺脾治同人參力遠不逮瀉石膏辛甘大寒入胃肺三焦瀉大熱知母苦寒入肺腎胃瀉腎膀胱熱黃連苦寒入肺心大腸膽胃肝瀉中焦積熱輕桔梗苦辛微溫入肺腎治咽喉頭目口鼻病散熱閉提氣血補內漏前胡辛甘微寒入肺三焦脾胃散結下氣療心腹結氣鬲上實熱散寒熱邪氣宣通及眉稜骨痛和氣活血去風逐濕天南星苦溫有毒入脾肺治風痰堅積麻痹口噤諸病消腫散瘀藿香辛甘微溫入脾肺流氣散六邪氣定嘔逆蘇子辛溫入心肺胃下氣開結補百合甘平入肺心補中保肺除浮腫薯蕷甘溫平入脾肺補氣養心氣胡桃甘平溫入肺腎滋肺潤血脈補腎益命門利三焦止小便茯苓甘淡瀉黃芩苦寒入肺大腸瀉熱茅根甘寒入脾胃肺瀉肺胃伏熱止血葶藶苦大寒入肺大腸膀胱行水逐積聚性猛利下行梔子苦寒入心肺氣分瀉三焦輕防風辛甘溫入肝膀胱肺胃脾治上焦風邪散結香薷辛微溫入胃脾心肺散金鬱治中暑霍亂瘧疾薄荷辛涼入肺心包兼入肝清六陽會首散熱風清利頭目咽喉蘇葉梗辛溫宣通水蘇辛微溫入肺肝下氣辟惡蘭草辛平入肺胃利水道除風調氣和營赤芍苦入肝肺脾散瘀利濕熱旋覆花鹹甘微溫入肺大腸散結氣除水消痰下氣桑白皮甘辛補平入肺心膀胱脾和中益氣除濕理脾生津潤肺安心神祕精蛤蚧鹹平入肺腎治久嗽咯血凝神聚氣瀉火除邪熱解鬱熱散毒風治五淋並治血病輕入心肺胃行氣達表通心利肺定喘消痰甘菊花甘平入肺肝治諸風頭目疾散遊風補陰氣利血脈牛蒡子辛平微涼入肺肝胃除風熱痰壅治咽喉頭面風病消斑疹麻黃苦辛宣通寒入肺治喘滿水腫利一切風水氣泄肺熱調中消痰開胃款冬花辛甘溫入肺主咳逆上氣勞咳刺蒺藜苦溫入肝肺下氣去脹滿破癥瘕惡血射干辛苦微溫有毒入肺腎膽補瀉輕溫入肺膀胱心大腸開毛孔腠理髮汗馬兜鈴苦辛寒入肺治肺熱痰結上氣辛夷辛溫入肺胃膀胱治風頭腦痛面腫引齒痛鼻淵鼻瘡宣通兼入肝脾散結氣邪逆行瘀利滿治喉痹薏苡仁甘微寒入肺脾利濕泄水益脾姜辛微溫入肺開胃止嘔吐消痰下氣通關節除風寒達明去穢惡杏仁甘苦溫入肺治咳逆上氣補瀉輕宣通散結去風熱消痰潤腸枳殼苦辛微酸寒入肺肝胃大腸瀉氣消痰滯寬胸治痢後重檀香辛溫入肺腎胃散冷氣引脾氣上升理胸膈咽嗌間氣紫菀苦辛補瀉輕手重白石英甘溫入肺大腸定咳逆肺溫入肺治咳逆上氣結氣陳皮苦辛溫入脾肺理氣消痰和中枇杷葉苦平入肺胃下氣清熱解暑毒滑澀礬石酸澀寒入腎肺肝能收陰燥丁香辛熱入肺胃腎溫脾胃虛濕露水甘平潤澤入肺滋陰太陰肺經重癰滑澀於至陽之中治痰熱解毒白芨苦辛甘微寒入肺止肺血補肺傷功專收澀又有泄熱散結之用白芍藥酸平入肝脾肺收陰氣安脾胃泄肝斂逆氣治血虛腹痛五味子酸溫燥寒嘔逆腎氣奔豚濕沙參甘微苦微寒入肺肝脾養肝脾潤肺貝母苦微寒入肺潤心肺滌熱消痰麥門冬甘微寒入肺潤經清肺火益心氣止渴除虛熱復脈梨甘微酸寒入心重滑澀入肺